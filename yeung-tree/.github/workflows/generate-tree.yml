name: Generate Family Tree

on:
  push:
    paths:
      - 'data/**.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate HTML
        run: python generate_tree.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html versions/
          git diff --cached --quiet || git commit -m "Auto-generate family tree from CSV [$(date '+%Y-%m-%d')]"
          git push
